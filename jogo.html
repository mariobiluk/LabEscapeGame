<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Contaminada</title>
    <link rel="stylesheet" href="./jogo.css">

    <script src="./jogo-selecao.js" defer></script>
    <script src="./audio.js" defer></script>

    <link rel="icon" type="image/png" sizes="32x32" href="./imagens_novas/icone.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./imagens_novas/icone.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Tela de Seleção do modo de jogo-->
    <div id="telaSelecao">
        <div class="selecao-box">
            <h1>ZONA CONTAMINADA</h1>
            <p class="sub">Selecione o modo de jogo</p>

            <div class="modos">
                <button class="modo-btn" onclick="iniciarJogo('solo')">
                    <span class="icone">🧟</span>
                    SOLO
                    <span class="descricao">Um jogador<br>Clique ou tecla para começar<br>W/↑ pular</span>
                </button>

                <button class="modo-btn" onclick="iniciarJogo('multiplayer')">
                    <span class="icone">🧟🧟</span>
                    MULTIPLAYER
                    <span class="descricao">Dois jogadores<br>J1: W/↑ pular<br>J2: I pular</span>
                </button>
            </div>

            <a href="./index.html" class="voltar-menu">← VOLTAR AO MENU</a>
        </div>
    </div>

    <div id="telaJogo">
        <canvas id="des1"></canvas>
        <div id="divisor"></div>
        <canvas id="des2" style="display:none;"></canvas>
    </div>

    <div id="labelModo"></div>

    <div id="avisoF5">Pressione F5 para reiniciar</div>

</body>

</html>
