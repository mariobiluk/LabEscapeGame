<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Contaminada</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./imagens_novas/icone.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./imagens_novas/icone.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Rajdhani', sans-serif;
            color: #39ff14;
            overflow: hidden;
        }

        /* ========================
       TELA DE SELEÇÃO DE MODO
    ========================= */
        #telaSelecao {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('./imagens_novas/fundoFinal.png') center/cover no-repeat;
        }

        #telaSelecao::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
        }

        .selecao-box {
            position: relative;
            text-align: center;
            padding: 50px 60px;
            border: 2px solid #39ff14;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }

        .selecao-box h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #39ff14;
            letter-spacing: 3px;
        }

        .selecao-box p.sub {
            color: #aaffaa;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .modos {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .modo-btn {
            width: 200px;
            padding: 28px 20px;
            border: 2px solid #39ff14;
            background: rgba(0, 0, 0, 0.6);
            color: #39ff14;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
        }

        .modo-btn:hover {
            background: #39ff14;
            color: #000;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
        }

        .modo-btn .icone {
            font-size: 2.2rem;
        }

        .modo-btn .descricao {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.78rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .voltar-menu {
            position: relative;
            margin-top: 30px;
            padding: 8px 20px;
            border: 1px solid #39ff14;
            background: transparent;
            color: #39ff14;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .voltar-menu:hover {
            background: #39ff14;
            color: #000;
        }

        /* ========================
       ÁREA DE JOGO
    ========================= */
        #telaJogo {
            display: none;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* Divisor entre os dois canvas no multiplayer */
        #divisor {
            display: none;
            width: 100%;
            height: 4px;
            background: #39ff14;
            box-shadow: 0 0 10px #39ff14;
            flex-shrink: 0;
        }

        canvas {
            display: block;
            width: 100%;
        }

        /* Solo: canvas1 ocupa tudo */
        #des1 {
            flex: 1;
        }

        /* Multiplayer: cada canvas ocupa metade */
        body.multiplayer #des1 {
            height: 50vh;
        }

        body.multiplayer #des2 {
            height: 50vh;
        }

        body.multiplayer #divisor {
            display: block;
        }

        /* Label de modo no canto */
        #labelModo {
            display: none;
            position: fixed;
            top: 6px;
            right: 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(57, 255, 20, 0.5);
            z-index: 10;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <!-- ===== TELA DE SELEÇÃO ===== -->
    <div id="telaSelecao">
        <div class="selecao-box">
            <h1>ZONA CONTAMINADA</h1>
            <p class="sub">Selecione o modo de jogo</p>

            <div class="modos">
                <button class="modo-btn" onclick="iniciarJogo('solo')">
                    <span class="icone">🧟</span>
                    SOLO
                    <span class="descricao">Um jogador<br>Clique ou tecla para começar<br>W/↑ pular</span>
                </button>

                <button class="modo-btn" onclick="iniciarJogo('multiplayer')">
                    <span class="icone">🧟🧟</span>
                    MULTIPLAYER
                    <span class="descricao">Dois jogadores<br>J1: W/↑ pular<br>J2: I pular</span>
                </button>
            </div>

            <a href="./index.html" class="voltar-menu">← VOLTAR AO MENU</a>
        </div>
    </div>

    <!-- ===== TELA DE JOGO ===== -->
    <div id="telaJogo">
        <canvas id="des1"></canvas>
        <div id="divisor"></div>
        <canvas id="des2" style="display:none;"></canvas>
    </div>

    <div id="labelModo"></div>

    <div id="avisoF5">Pressione F5 para reiniciar</div>

    <!-- Scripts carregados só quando o jogo inicia -->
    <script>
        function iniciarJogo(modo) {
            // Salva o modo escolhido para o index.js ler
            sessionStorage.setItem('modoJogo', modo)

            // Esconde seleção, mostra jogo
            document.getElementById('telaSelecao').style.display = 'none'
            document.getElementById('telaJogo').style.display = 'flex'

            const label = document.getElementById('labelModo')
            label.style.display = 'block'
            label.textContent = modo === 'multiplayer' ? 'MULTIPLAYER' : 'SOLO'

            if (modo === 'multiplayer') {
                document.body.classList.add('multiplayer')
                document.getElementById('des2').style.display = 'block'
            }

            // Carrega os scripts do jogo dinamicamente (garante que o DOM já tem os canvas)
            carregarScript('./models/Carro.js', () => {
                carregarScript('./index.js', () => {
                    console.log('Scripts carregados!')
                })
            })
        }

        function carregarScript(src, callback) {
            const s = document.createElement('script')
            s.src = src
            s.onload = callback
            document.body.appendChild(s)
        }
    </script>

    <script src="./audio.js"></script>

</body>

</html>
