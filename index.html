<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Zona Contaminada</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="aviso-fullscreen" id="aviso">
        Pressione F11 para tela cheia — melhor experiência
    </div>

    <div class="bg"></div>
    <div class="overlay"></div>

    <!-- PARTÍCULAS -->
    <div id="particles"></div>

    <!-- MENU -->
    <div class="menu">
        <a href="./jogo.html" class="btn play" onclick="pararMusica()">▶ JOGAR</a>
        <a href="./sobre.html" class="btn">SOBRE</a>
        <a href="./devs.html" class="btn">DESENVOLVEDORES</a>
    </div>

    <audio id="musicaMenu" src="./audio/soundtrack.mp3" loop></audio>

    <script>
        // PARTÍCULAS
        const pContainer = document.getElementById('particles');

        for (let i = 0; i < 20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '0px';
            p.style.animationDuration = (4 + Math.random() * 4) + 's';
            pContainer.appendChild(p);

        }

        // TENTA fullscreen ao clicar em qualquer lugar
        document.addEventListener("click", () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => { });
            }
        }, { once: true });

        // some o aviso depois
        setTimeout(() => {
            const aviso = document.getElementById("aviso");
            if (aviso) aviso.style.display = "none";
        }, 6000);

        const musica = document.getElementById("musicaMenu")
        musica.volume = 0.2

        let musicaIniciada = false

        function iniciarMusica() {
            if (!musicaIniciada) {
                musica.play()
                musicaIniciada = true
            }
        }

        // 🔥 começa com qualquer tecla (incluindo F11)
        document.addEventListener("keydown", iniciarMusica)

        // 🔥 começa também com clique
        document.addEventListener("click", iniciarMusica, { once: true })

        // botão JOGAR
        function pararMusica() {
            musica.pause()
        }
    </script>

</body>

</html>
